name: 🧪 Test

on:
  push:
    branches:
      - main
      - beta
  pull_request: {}
  workflow_dispatch: {}

permissions: {}

jobs:
  test:
    name: 🧪 Test
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    permissions:
      actions: write
      contents: read

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/beta' }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # main
        with:
          persist-credentials: false

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # main
        with:
          node-version-file: "package.json"

      - name: 🗄 Cache node_modules
        id: cache-node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # main
        with:
          path: "**/node_modules"
          key: node_modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: 🗄 Cache .eslintcache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # main
        with:
          path: .eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: 🔍 Install dependencies
        if: steps.cache-node_modules.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit --strict-peer-deps

      # `.npmrc` sets `ignore-scripts=true`. In case there is
      # a build script, it must now get executed explicitly.
      - name: 📦 Build
        run: npm run build --if-present

      - name: 🧪 Run tests
        env:
          CI: true
        run: |
          npm test
