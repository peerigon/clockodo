name: 🔍 Lint Secrets

on:
  push:
    branches:
      - main
      - beta
  pull_request: {}
  workflow_dispatch: {}

permissions: {}

jobs:
  lint-secrets:
    name: 🔍 Lint Secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e # main
        with:
          persist-credentials: false

      - name: 🔍 Run secretlint
        shell: bash
        run: |
          set -euo pipefail

          secretlint_version="$(node -p "require('./package.json').devDependencies.secretlint")"
          secretlint_version="${secretlint_version#^}"
          secretlint_version="${secretlint_version#~}"
          secretlint_version="${secretlint_version#v}"

          docker run --rm --network none \
            -v "${PWD}:${PWD}" -w "${PWD}" \
            "secretlint/secretlint:v${secretlint_version}" \
            secretlint --format github "**/*"
